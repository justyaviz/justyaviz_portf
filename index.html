<!doctype html>
<html lang="uz">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>YAVIZ - Digital Marketing & Professional Portfolio</title>
    <meta name="description" content="Kreativ digital marketing va mahsulot sotish bo'yicha professional portfolio. Barcha turdasi SMM, branding, va biznesingiz rivoji uchun xizmatlar." />
    
    <!-- Open Graph for Social Media -->
    <meta property="og:title" content="YAVIZ - Digital Marketing" />
    <meta property="og:description" content="Kreativ digital marketing va mahsulot sotish bo'yicha professional portfolio." />
    <meta property="og:type" content="website" />
    
    <!-- Structured Data for Google Sitelinks -->
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "WebSite",
        "name": "YAVIZ",
        "url": "https://yaviz.uz/",
        "potentialAction": {
          "@type": "SearchAction",
          "target": "https://yaviz.uz/search?q={search_term_string}",
          "query-input": "required name=search_term_string"
        }
      }
    </script>
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "Organization",
        "name": "YAVIZ Digital",
        "url": "https://yaviz.uz/",
        "logo": "https://yaviz.uz/logo.png"
      }
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
